services:
  db:
    image: postgres:15-alpine
    container_name: nlp_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nlp_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nlp_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nlp_platform
      SECRET_KEY: change-me-in-production-docker
      LOCAL_AUDIO_DIR: /app/uploads/audio
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - audio_data:/app/uploads/audio

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nlp_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8000

volumes:
  pgdata:
  audio_data:
